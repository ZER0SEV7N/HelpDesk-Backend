version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: helpdesk_mysql
    restart: always
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: helpdesk_db
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: helpdesk
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  mongodb:
    image: mongo:latest
    container_name: helpdesk_mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: helpdesk_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --save 200 1 --loglevel warning

volumes:
  mysql_data:
  mongodb_data:
  redis_data: